<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mindcase | SaaS Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0B0C10;
            --surface: #1A1C23;
            --surface-light: #252833;
            --accent: #3D6AFA;
            --accent-soft: rgba(61, 106, 250, 0.15);
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --success: #10B981;
            --danger: #EF4444;
            --border: rgba(255, 255, 255, 0.08);
            --blur: blur(12px);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        body {
            background: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: radial-gradient(circle at top right, #1a233a, var(--bg));
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-height: 700px) {
            #app { height: 860px; border-radius: 48px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        }

        /* --- UI COMPONENTS --- */

        .header {
            padding: 25px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .account-trigger {
            background: var(--surface);
            padding: 10px 20px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .account-trigger:hover { background: var(--surface-light); border-color: var(--accent); }

        .balance-hero {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease;
        }
        .balance-hero .val { font-size: 56px; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; }
        .balance-hero .sub { color: var(--text-dim); font-size: 14px; font-weight: 500; }

        .actions-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px 40px;
        }
        .btn-action {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-4px); }
        .btn-action i { font-size: 18px; }
        .btn-action span { font-size: 12px; font-weight: 600; }

        /* --- ASSETS --- */
        .assets-card {
            background: rgba(26, 28, 35, 0.6);
            backdrop-filter: var(--blur);
            border-radius: 35px 35px 0 0;
            flex: 1;
            padding: 30px 25px;
            border-top: 1px solid var(--border);
            overflow-y: auto;
        }
        .asset-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
        }
        .asset-img { width: 46px; height: 46px; border-radius: 14px; }
        .asset-info { flex: 1; }
        .asset-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .asset-price { font-size: 13px; color: var(--text-dim); }
        .asset-right { text-align: right; }

        /* --- MODALS (CENTERED) --- */
        .modal-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            background: var(--surface);
            width: 100%;
            border-radius: 32px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- INPUTS --- */
        .input-group {
            background: var(--surface-light);
            border-radius: 18px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            border: 1px solid transparent;
        }
        .input-group:focus-within { border-color: var(--accent); }
        .input-group input { 
            background: none; border: none; color: white; width: 100%; 
            font-size: 16px; font-weight: 500; outline: none;
        }
        .input-group i { color: var(--text-dim); width: 20px; }

        .btn-primary {
            background: var(--accent);
            color: white; border: none; width: 100%;
            padding: 20px; border-radius: 20px;
            font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-primary:active { transform: scale(0.96); }

        /* --- PIN LOCK SCREEN --- */
        #pin-screen {
            position: absolute; inset: 0; background: var(--bg);
            z-index: 2000; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .pin-dots { display: flex; gap: 15px; margin-bottom: 50px; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border); }
        .dot.filled { background: var(--accent); border-color: var(--accent); }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            height: 90px; background: var(--surface);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 20px; border-top: 1px solid var(--border);
        }
        .nav-link { color: var(--text-dim); text-align: center; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 22px; margin-bottom: 5px; }
        .nav-link span { display: block; font-size: 11px; font-weight: 700; }

        #toast {
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 12px 25px; border-radius: 50px;
            font-size: 14px; font-weight: 600; display: none; z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="toast">Success</div>

        <div id="screen-auth" style="display: flex; flex-direction: column; height: 100%; padding: 40px; justify-content: center;">
            <div style="text-align: center; margin-bottom: 60px;">
                <div style="width:80px; height:80px; background:var(--accent); border-radius:24px; margin: 0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:32px; box-shadow: 0 20px 40px var(--accent-soft);">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 style="font-size: 32px; margin:0;">Mindcase</h1>
                <p style="color:var(--text-dim)">Institutional-grade wallet</p>
            </div>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="reg-name" placeholder="Username">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="reg-pass" placeholder="Create Access PIN">
            </div>
            <button class="btn-primary" onclick="app.register()">Initialize Wallet <i class="fas fa-arrow-right" style="margin-left:8px"></i></button>
        </div>

        <div id="pin-screen">
            <h2 style="margin-bottom: 10px;">Security Check</h2>
            <p style="color:var(--text-dim); margin-bottom: 40px;">Enter PIN to access <span id="pin-target-name"></span></p>
            <div class="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('1')">1</button>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('2')">2</button>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('3')">3</button>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('4')">4</button>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('5')">5</button>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('6')">6</button>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('7')">7</button>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('8')">8</button>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('9')">9</button>
                <span></span>
                <button class="btn-action" style="padding:25px;" onclick="app.addPin('0')">0</button>
                <button class="btn-action" style="padding:25px; border-color:var(--danger)" onclick="app.resetPin()"><i class="fas fa-backspace"></i></button>
            </div>
        </div>

        <div id="main-ui" style="display: none; height: 100%; flex-direction: column;">
            <div class="header">
                <div class="account-trigger" onclick="app.toggleAccounts()">
                    <div style="width:24px; height:24px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:10px;">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <span id="active-user-display">Account</span>
                    <i class="fas fa-chevron-down" style="font-size: 10px; color:var(--text-dim)"></i>
                </div>
            </div>

            <div id="view-wallet" style="flex:1; display:flex; flex-direction:column; overflow: hidden;">
                <div class="balance-hero">
                    <div class="sub">Current Portfolio Value <i class="fas fa-circle-info"></i></div>
                    <div class="val" id="main-balance">$0.00</div>
                    <div style="color:var(--success); font-weight:700; font-size:14px;">
                        <i class="fas fa-arrow-trend-up"></i> +4.25% Today
                    </div>
                </div>

                <div class="actions-row">
                    <div class="btn-action" onclick="app.openModal('send')">
                        <i class="fas fa-paper-plane"></i>
                        <span>Send</span>
                    </div>
                    <div class="btn-action" onclick="app.openModal('receive')">
                        <i class="fas fa-qrcode"></i>
                        <span>Receive</span>
                    </div>
                    <div class="btn-action" onclick="app.showToast('KYC Required')">
                        <i class="fas fa-credit-card"></i>
                        <span>Buy</span>
                    </div>
                    <div class="btn-action" onclick="app.showToast('Exchange Offline')">
                        <i class="fas fa-shuffle"></i>
                        <span>Swap</span>
                    </div>
                </div>

                <div class="assets-card">
                    <h3 style="margin: 0 0 20px; font-size: 18px;">Assets Portfolio</h3>
                    <div id="asset-list">
                        </div>
                </div>
            </div>

            <div class="bottom-nav">
                <div class="nav-link active" onclick="app.switchView('wallet')">
                    <i class="fas fa-house-chimney-window"></i>
                    <span>Portfolio</span>
                </div>
                <div class="nav-link" onclick="app.switchView('history')">
                    <i class="fas fa-list-ul"></i>
                    <span>Activity</span>
                </div>
                <div class="nav-link" onclick="app.switchView('settings')">
                    <i class="fas fa-gear"></i>
                    <span>Settings</span>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="modal-overlay" onclick="app.closeModal()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div id="modal-send" style="display: none;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                        <h2 style="margin:0">Send Assets</h2>
                        <i class="fas fa-xmark" onclick="app.closeModal()" style="cursor:pointer"></i>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-at"></i>
                        <input type="text" id="send-addr" placeholder="Recipient Address">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-coins"></i>
                        <input type="number" id="send-amount" placeholder="0.00">
                        <span style="font-weight:700; color:var(--accent)">TON</span>
                    </div>
                    <button class="btn-primary" onclick="app.confirmSend()">Sign & Send <i class="fas fa-bolt-lightning"></i></button>
                </div>

                <div id="modal-receive" style="display: none; text-align: center;">
                    <h2 style="margin-bottom:25px;">Deposit Assets</h2>
                    <div style="background: white; padding: 20px; border-radius: 24px; display: inline-block; margin-bottom: 20px;">
                        <img id="qr-dest" style="width: 180px; height: 180px;">
                    </div>
                    <div class="input-group" style="cursor:pointer" onclick="app.copyAddress()">
                        <input type="text" id="copy-addr-val" readonly style="text-align: center; font-family: monospace;">
                        <i class="fas fa-copy"></i>
                    </div>
                    <p style="color:var(--text-dim); font-size:12px;">Only send supported assets to this network</p>
                </div>

                <div id="modal-accounts" style="display: none;">
                    <h2 style="margin-bottom:20px;">Manage Wallets</h2>
                    <div id="accounts-render"></div>
                    <button class="btn-primary" style="background:var(--surface-light); margin-top:20px;" onclick="app.logout()">
                        <i class="fas fa-plus"></i> Add New Account
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const COINS = [
            { id: 'ton', name: 'Toncoin', symbol: 'TON', icon: 'https://cryptologos.cc/logos/toncoin-ton-logo.svg', price: 7.12 },
            { id: 'btc', name: 'Bitcoin', symbol: 'BTC', icon: 'https://cryptologos.cc/logos/bitcoin-btc-logo.svg', price: 72400 },
            { id: 'eth', name: 'Ethereum', symbol: 'ETH', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg', price: 3820 },
            { id: 'usdt', name: 'Tether', symbol: 'USDT', icon: 'https://cryptologos.cc/logos/tether-usdt-logo.svg', price: 1.00 }
        ];

        class PremiumWallet {
            constructor() {
                this.db = null;
                this.user = null;
                this.pinBuffer = "";
                this.allUsers = [];
                this.init();
            }

            async init() {
                this.db = await this.setupDB();
                this.loadUsers();
            }

            setupDB() {
                return new Promise(r => {
                    const req = indexedDB.open("MindcaseSaaS", 3);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        if(!db.objectStoreNames.contains("users")) db.createObjectStore("users", { keyPath: "name" });
                    };
                    req.onsuccess = e => r(e.target.result);
                });
            }

            async loadUsers() {
                const tx = this.db.transaction("users", "readonly");
                tx.objectStore("users").getAll().onsuccess = e => this.allUsers = e.target.result;
            }

            async register() {
                const name = document.getElementById('reg-name').value.trim();
                const pin = document.getElementById('reg-pass').value;
                if(!name || pin.length < 4) return alert("Enter valid name and PIN (4+ digits)");

                const tx = this.db.transaction("users", "readwrite");
                const store = tx.objectStore("users");
                const newUser = {
                    name, pin,
                    balances: { ton: 200, btc: 0.1, eth: 2, usdt: 1000 },
                    addr: "0x" + Math.random().toString(36).substring(2, 14).toUpperCase(),
                    history: []
                };
                store.add(newUser);
                this.user = newUser;
                this.start();
            }

            start() {
                document.getElementById('screen-auth').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                this.render();
                this.loadUsers();
            }

            addPin(digit) {
                if(this.pinBuffer.length >= 4) return;
                this.pinBuffer += digit;
                const dots = document.querySelectorAll('.dot');
                dots[this.pinBuffer.length - 1].classList.add('filled');

                if(this.pinBuffer.length === 4) {
                    setTimeout(() => {
                        if(this.pinBuffer === this.userToUnlock.pin) {
                            this.user = this.userToUnlock;
                            document.getElementById('pin-screen').style.display = 'none';
                            this.start();
                            this.resetPin();
                        } else {
                            this.showToast("Wrong PIN");
                            this.resetPin();
                        }
                    }, 200);
                }
            }

            resetPin() {
                this.pinBuffer = "";
                document.querySelectorAll('.dot').forEach(d => d.classList.remove('filled'));
            }

            render() {
                const list = document.getElementById('asset-list');
                list.innerHTML = '';
                let total = 0;

                COINS.forEach(c => {
                    const bal = this.user.balances[c.id] || 0;
                    const usd = bal * c.price;
                    total += usd;

                    list.innerHTML += `
                        <div class="asset-item">
                            <img src="${c.icon}" class="asset-img">
                            <div class="asset-info">
                                <div class="asset-name">${c.name}</div>
                                <div class="asset-price">$${c.price.toLocaleString()}</div>
                            </div>
                            <div class="asset-right">
                                <div class="asset-name">${bal.toLocaleString()} ${c.symbol}</div>
                                <div class="asset-price" style="color:var(--success)">$${usd.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('main-balance').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                document.getElementById('active-user-display').innerText = this.user.name;
                document.getElementById('copy-addr-val').value = this.user.addr;
                document.getElementById('qr-dest').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${this.user.addr}`;
            }

            openModal(type) {
                document.getElementById('modal-overlay').style.display = 'flex';
                document.getElementById('modal-send').style.display = 'none';
                document.getElementById('modal-receive').style.display = 'none';
                document.getElementById('modal-accounts').style.display = 'none';
                
                if(type === 'send') document.getElementById('modal-send').style.display = 'block';
                if(type === 'receive') document.getElementById('modal-receive').style.display = 'block';
                if(type === 'accounts') {
                    document.getElementById('modal-accounts').style.display = 'block';
                    this.renderAccountList();
                }
            }

            closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

            toggleAccounts() { this.openModal('accounts'); }

            renderAccountList() {
                const container = document.getElementById('accounts-render');
                container.innerHTML = this.allUsers.map(u => `
                    <div class="asset-item" onclick="app.requestUnlock('${u.name}')" style="background:var(--surface-light); padding:15px; border-radius:18px; margin-bottom:10px; border:1px solid ${u.name === this.user.name ? 'var(--accent)' : 'transparent'}">
                        <i class="fas fa-user-circle" style="font-size:24px; color:var(--accent)"></i>
                        <div class="asset-info">
                            <div class="asset-name">${u.name}</div>
                            <div class="asset-price">${u.addr.substring(0,10)}...</div>
                        </div>
                        ${u.name === this.user.name ? '<i class="fas fa-check" style="color:var(--success)"></i>' : ''}
                    </div>
                `).join('');
            }

            requestUnlock(name) {
                this.closeModal();
                const u = this.allUsers.find(x => x.name === name);
                this.userToUnlock = u;
                document.getElementById('pin-target-name').innerText = name;
                document.getElementById('pin-screen').style.display = 'flex';
            }

            confirmSend() {
                const amt = parseFloat(document.getElementById('send-amount').value);
                if(amt > 0 && this.user.balances.ton >= amt) {
                    this.user.balances.ton -= amt;
                    this.save();
                    this.showToast("Payment Dispatched");
                    this.closeModal();
                    this.render();
                } else {
                    this.showToast("Low Balance");
                }
            }

            async save() {
                const tx = this.db.transaction("users", "readwrite");
                tx.objectStore("users").put(this.user);
            }

            copyAddress() {
                navigator.clipboard.writeText(this.user.addr);
                this.showToast("Copied to clipboard");
            }

            showToast(msg) {
                const t = document.getElementById('toast');
                t.innerText = msg; t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2000);
            }

            logout() { location.reload(); }
        }

        const app = new PremiumWallet();
    </script>
</body>
</html>
